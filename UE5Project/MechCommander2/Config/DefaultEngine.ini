; MC2 UE5 — Engine defaults
; NavMesh is configured here so all agents get correct clearance per mech weight class.
; MC2 mechs range from 20t light (1.5m radius) to 100t assault (2.5m radius).
; One RecastNavMesh is shared; per-agent filtering is done via UMC2NavQueryFilter.

[/Script/NavigationSystem.NavigationSystemV1]
bAllowClientSideNavigation=False
DefaultAgentName=BattleMech

; Default agent — medium mech (50t, radius 1.8m, height 9m)
+SupportedAgents=(Name="BattleMech",Color=(R=0,G=200,B=255,A=164),DefaultQueryExtent=(X=50.0,Y=50.0,Z=250.0),NavWalkingSearchHeightScale=0.500000,bCanCrouch=False,bCanJump=False,bCanWalk=True,bCanSwim=False,AgentRadius=180.0,AgentHeight=900.0,AgentStepHeight=-1.0,NavMeshCellSize=19.0,NavMeshCellHeight=10.0,PreferredNavData=/Script/NavigationSystem.RecastNavMesh)

[/Script/NavigationSystem.RecastNavMesh]
; Tile size: 64 cells × 19cm = ~1200cm per tile (good for 120×120 maps)
TileSizeUU=1200.0
; BattleTech standard walkable slope: 45 degrees (mechs can traverse steep terrain)
WalkableSlopeAngle=45.0
; Min ledge height a mech can step down without issue
AgentMaxStepHeight=45.0
; Draw nav mesh in game for debugging (toggle via show navigation)
bDrawNavMesh=False
; Rebuild nav mesh on load (for editor + cooked builds)
bAutoDestroyWhenNoNavigation=False
bRebuildAtRuntime=False

; Nav invoker — mechs register themselves as nav invokers so only locally-relevant
; tiles are generated (important for large 120×120 terrain maps)
[/Script/AIModule.AIModuleSettings]
bUseNavLocalCurrentCost=True

; Mech weight-class agent radii (used when overriding per BTTask_MoveToAttackRange):
;   Light  (<35t):  AgentRadius = 140 (1.4m)
;   Medium (35-55t): AgentRadius = 180 (1.8m)  ← default above
;   Heavy  (55-75t): AgentRadius = 220 (2.2m)
;   Assault(>75t):  AgentRadius = 260 (2.6m)
;
; The UMC2NavQueryFilter overrides these per-query via SetAgentRadius.
