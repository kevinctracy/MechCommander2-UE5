; MC2 UE5 — Enhanced Input default bindings
; These are the out-of-box key assignments. Players can override them via
; UMC2GameUserSettings::RemapKey() which writes overrides to GameUserSettings.ini.
;
; The Input Mapping Context (IMC_MC2Default) wires these to the IA_ assets listed in
; UMC2InputConfig.  Create the IMC asset in the editor and assign it in BP_MC2PlayerController.

[/Script/EnhancedInput.EnhancedInputDeveloperSettings]
DefaultMappingContexts=/Game/Input/IMC_MC2Default.IMC_MC2Default

; ---- Camera ----
; IA_CameraPan        WASD  (2D axis, W=+Y, S=-Y, A=-X, D=+X)
; IA_CameraZoom       Mouse Wheel Up/Down (1D axis)
; IA_CameraRotate     Q / E (1D axis)
; IA_CameraEdgeScroll (derived from cursor position in PlayerController)

; ---- Selection ----
; IA_SelectPrimary    Left Mouse Button
; IA_SelectAdditive   Shift + Left Mouse Button
; IA_SelectBox        Left Mouse Button (hold/drag — same IA, PlayerController disambiguates)
; IA_SelectAll        Ctrl + A

; ---- Orders ----
; IA_OrderMove        Right Mouse Button (on ground)
; IA_OrderAttack      Right Mouse Button (on enemy — same key, context-sensitive)
; IA_OrderAttackMove  A  (then left-click destination)
; IA_OrderGuard       G
; IA_OrderStop        S

; ---- Control Groups ----
; IA_AssignGroup      Ctrl + 1..9  (modifier key combo)
; IA_SelectGroup      1..9

; ---- UI ----
; IA_Pause            P  or  Escape
; IA_TacMap           Tab
; IA_MechBay          M

; ---- Misc ----
; IA_Jump             Space
; IA_Screenshot       F12

; Bindings are authored in the IMC_MC2Default Data Asset (editor-side).
; This file documents intent; actual key↔action mapping lives in the IMC uasset.
